name: Build and Test
on:
  push:
    paths-ignore:
      - "**.md"
      - "**.sh"
  pull_request:
    paths-ignore:
      - "**.md"
      - "**.sh"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: cargo fmt + clippy + check
    runs-on: ubuntu-latest
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@v6
 
      - name: Setup | Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
 
      - name: Setup | Cache Cargo
        uses: Swatinem/rust-cache@v2
 
      - name: Build | cargo fmt
        run: cargo fmt --all -- --check
 
      - name: Build | cargo clippy
        run: cargo clippy --all-targets --all-features
 
      - name: Build | cargo check
        run: cargo check --all

  test:
    name: Test - ${{ matrix.os }}
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
 
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@v6
 
      - name: Setup | Rust
        uses: dtolnay/rust-toolchain@stable
 
      - name: Setup | Cache Cargo
        uses: Swatinem/rust-cache@v2
 
      - name: Build | cargo test
        run: cargo test --all

